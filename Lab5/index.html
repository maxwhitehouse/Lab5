<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-12 Schools by State</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        #title {
            text-align: center;
            font-size: 22px;
            font-weight: bold;
            padding: 12px;
            background: white;
            z-index: 1000;
        }

        #map {
            height: 90vh;
            width: 100%;
        }

        .legend {
            background: white;
            padding: 10px;
            line-height: 18px;
            color: #333;
            box-shadow: 0 0 8px rgba(0,0,0,0.2);
            border-radius: 5px;
        }

        .legend i {
            width: 18px;
            height: 18px;
            float: left;
            margin-right: 8px;
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <div id="title">Public Primary and Secondary Schools by State</div>
    <div id="map"></div>

    <script src="js/scripts.js"></script>
</body>
</html>
